<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근무 편성 조회</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>📅 근무 편성 조회</h1>

    <label>조회 날짜</label>
    <input type="date" id="date">

    <div class="card">

        <h3>🌞 주간 (갑반)</h3>
        <ul id="dayList">
            <li>날짜를 선택하세요.</li>
        </ul>

        <hr>

        <h3>🌙 야간 (을반)</h3>
        <ul id="nightList">
            <li>날짜를 선택하세요.</li>
        </ul>

        <hr>

        <h3>😴 비번 (병반)</h3>
        <ul id="offList">
            <li>날짜를 선택하세요.</li>
        </ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
