<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>근무편성 조회</title>

<style>

body{
    font-family:"Malgun Gothic", Arial, sans-serif;
    margin:0;
    padding:20px;
    background:#f5f5f5;
}

.container{
    max-width:420px;
    margin:auto;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    box-sizing:border-box;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:10px;
}

button{

    flex:1;

    padding:12px;

    font-size:18px;

    border:0;

    border-radius:8px;

    background:#1976d2;

    color:white;

    cursor:pointer;

}

.box{

    background:white;

    margin-top:15px;

    padding:15px;

    border-radius:10px;

    box-shadow:0 2px 5px #ccc;

}

.title{

    font-size:20px;

    font-weight:bold;

    border-bottom:1px solid #ddd;

    padding-bottom:8px;

    margin-bottom:10px;

}

.member{

    font-size:17px;

    line-height:1.8;

}

</style>

</head>

<body>

<div class="container">

<h1>
근무편성 조회
</h1>

<input
type="date"
id="date"
onchange="searchWork()">

<div class="button-group">

<button id="prevBtn" onclick="moveDate(-1)">
◀ 어제
</button>

<button id="nextBtn" onclick="moveDate(1)">
내일 ▶
</button>

</div>

<div id="result"></div>

</div>

<script src="script.js?v=4"></script>

</body>

</html>
